<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字でいざ勝負</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 和風カラーパレット */
            --bg-color: #f6f5f0; /* 和紙のような白 */
            --main-color: #2b2b2b; /* 墨色 */
            --accent-color: #c9171e; /* 紅赤 */
            --gold-color: #d4af37; /* 黄金色 */
            --secondary-bg: #e2dcc8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Serif JP', serif;
            background-color: var(--bg-color);
            color: var(--main-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* 和風の薄いテクスチャ/パターン */
            background-image: 
                radial-gradient(var(--secondary-bg) 10%, transparent 10%),
                radial-gradient(var(--secondary-bg) 10%, transparent 10%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: 600px;
            position: relative;
            background: rgba(246, 245, 240, 0.95);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            border: 4px solid var(--main-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 共通の画面スタイル */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        /* スタート画面 */
        #title-screen h1 {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent-color);
            text-shadow: 2px 2px 0px var(--gold-color);
            margin-bottom: 10px;
            writing-mode: vertical-rl; /* 縦書き */
            letter-spacing: 0.2em;
        }

        .btn {
            background-color: var(--main-color);
            color: var(--bg-color);
            border: 2px solid var(--main-color);
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Noto Serif JP', serif;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background-color: var(--bg-color);
            color: var(--main-color);
        }

        /* ゲーム画面 */
        #header-hud {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 2px solid var(--main-color);
            background-color: var(--main-color);
            color: var(--bg-color);
        }

        #timer-bar-container {
            width: 100%;
            height: 10px;
            background-color: #ddd;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background-color: var(--accent-color);
            transition: width 0.1s linear, background-color 0.3s;
        }

        #kanji-display {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #kanji-text {
            font-size: 8rem;
            font-weight: 900;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        /* 迫りくるアニメーション */
        .zoom-in {
            animation: zoomIn 10s linear forwards;
        }

        @keyframes zoomIn {
            0% { transform: scale(0.5); }
            100% { transform: scale(1.5); }
        }

        #input-area {
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.05));
        }

        #reading-input {
            font-size: 2rem;
            padding: 10px 20px;
            text-align: center;
            border: 3px solid var(--main-color);
            border-radius: 8px;
            width: 80%;
            font-family: 'Noto Serif JP', serif;
            outline: none;
            background-color: rgba(255,255,255,0.8);
        }

        #reading-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(201, 23, 30, 0.3);
        }

        .hint-text {
            margin-top: 10px;
            font-size: 1rem;
            color: #666;
        }

        /* フィードバック (〇 ✕) */
        #feedback {
            position: absolute;
            font-size: 15rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .feedback-maru {
            color: var(--accent-color);
        }

        .feedback-batsu {
            color: #1e3ebd; /* 濃い青 */
        }

        .show-feedback {
            opacity: 0.8 !important;
            transform: scale(1) !important;
        }

        /* ステージ表示アニメーション */
        #stage-announcer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            color: var(--main-color);
            background: rgba(246, 245, 240, 0.9);
            padding: 20px 50px;
            border: 4px solid var(--main-color);
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .announce {
            animation: announceAnim 2s forwards;
        }

        @keyframes announceAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }

        /* ライフ */
        .heart {
            color: var(--accent-color);
        }

        /* スマホ対応 */
        @media (max-width: 600px) {
            #title-screen h1 { font-size: 3rem; }
            #kanji-text { font-size: 5rem; }
            #reading-input { font-size: 1.5rem; width: 90%; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- タイトル画面 -->
    <div id="title-screen" class="screen active">
        <h1>漢字でいざ勝負</h1>
        <p style="margin-top: 20px; font-weight: bold;">〜 迫りくる漢字の読みを打ち込め 〜</p>
        <button class="btn" onclick="startGame()">いざ、尋常に</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="play-screen" class="screen">
        <div id="header-hud">
            <div id="score-display">得点: 0</div>
            <div id="stage-display">序段</div>
            <div id="lives-display"><span class="heart">♥♥♥</span></div>
        </div>
        <div id="timer-bar-container">
            <div id="timer-bar"></div>
        </div>
        
        <div id="kanji-display">
            <div id="kanji-text">漢</div>
            <div id="feedback">〇</div>
        </div>

        <div id="input-area">
            <input type="text" id="reading-input" placeholder="ひらがなで入力" autocomplete="off" spellcheck="false">
            <div class="hint-text">IME（日本語入力）をオンにして入力後、Enterキー</div>
        </div>
    </div>

    <!-- 結果画面 -->
    <div id="result-screen" class="screen">
        <h2 style="font-size: 3rem; color: var(--main-color); margin-bottom: 10px;">勝負あり</h2>
        <div style="font-size: 2rem; margin-bottom: 30px;">最終得点: <span id="final-score" style="color: var(--accent-color); font-weight: bold; font-size: 3rem;">0</span></div>
        <p id="evaluation" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 20px;"></p>
        <button class="btn" onclick="returnToTitle()">初めから</button>
    </div>

    <!-- ステージ演出用 -->
    <div id="stage-announcer"></div>
</div>

<script>
    // --- 漢字データ (難易度別) ---
    const kanjiDatabase = {
        1: [ // 序段 (簡単)
            { word: '挨拶', reading: 'あいさつ' },
            { word: '時計', reading: 'とけい' },
            { word: '鉛筆', reading: 'えんぴつ' },
            { word: '図書', reading: 'としょ' },
            { word: '切手', reading: 'きって' },
            { word: '階段', reading: 'かいだん' },
            { word: '教室', reading: 'きょうしつ' },
            { word: '真剣', reading: 'しんけん' }
        ],
        2: [ // 中段 (普通)
            { word: '向日葵', reading: 'ひまわり' },
            { word: '蒲公英', reading: 'たんぽぽ' },
            { word: '紫陽花', reading: 'あじさい' },
            { word: '秋桜', reading: 'こすもす' },
            { word: '胡瓜', reading: 'きゅうり' },
            { word: '南瓜', reading: 'かぼちゃ' },
            { word: '西瓜', reading: 'すいか' },
            { word: '独楽', reading: 'こま' }
        ],
        3: [ // 上段 (やや難)
            { word: '流石', reading: 'さすが' },
            { word: '欠伸', reading: 'あくび' },
            { word: '無花果', reading: 'いちじく' },
            { word: '海月', reading: 'くらげ' },
            { word: '栄螺', reading: 'さざえ' },
            { word: '蟷螂', reading: 'かまきり' },
            { word: '百足', reading: 'むかで' },
            { word: '水母', reading: 'くらげ' }
        ],
        4: [ // 達人 (難読)
            { word: '躊躇', reading: 'ちゅうちょ' },
            { word: '魑魅魍魎', reading: 'ちみもうりょう' },
            { word: '薔薇', reading: 'ばら' },
            { word: '憂鬱', reading: 'ゆううつ' },
            { word: '躑躅', reading: 'つつじ' },
            { word: '顳顬', reading: 'こめかみ' },
            { word: '阿吽', reading: 'あうん' },
            { word: '雲丹', reading: 'うに' }
        ]
    };

    const stageNames = { 1: "序段", 2: "中段", 3: "上段", 4: "達人" };
    const timeLimits = { 1: 10000, 2: 8000, 3: 6000, 4: 5000 }; // ミリ秒

    // --- ゲーム状態変数 ---
    let currentStage = 1;
    let score = 0;
    let lives = 3;
    let currentKanji = null;
    let timerInterval;
    let timeLeft;
    let maxTime;
    let isPlaying = false;
    let questionCountInStage = 0;
    const questionsPerStage = 4;

    // DOM要素
    const screens = {
        title: document.getElementById('title-screen'),
        play: document.getElementById('play-screen'),
        result: document.getElementById('result-screen')
    };
    const ui = {
        kanji: document.getElementById('kanji-text'),
        input: document.getElementById('reading-input'),
        score: document.getElementById('score-display'),
        lives: document.getElementById('lives-display'),
        stage: document.getElementById('stage-display'),
        timerBar: document.getElementById('timer-bar'),
        feedback: document.getElementById('feedback'),
        announcer: document.getElementById('stage-announcer')
    };

    // --- ユーティリティ ---
    // カタカナをひらがなに変換（入力の揺れを許容するため）
    function kataToHira(str) {
        return str.replace(/[\u30a1-\u30f6]/g, function(match) {
            var chr = match.charCodeAt(0) - 0x60;
            return String.fromCharCode(chr);
        });
    }

    // 画面切り替え
    function switchScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenName].classList.add('active');
    }

    // --- ゲーム制御 ---
    async function startGame() {
        score = 0;
        lives = 3;
        currentStage = 1;
        questionCountInStage = 0;
        updateHUD();
        switchScreen('play');
        ui.input.value = '';
        
        await announceStage();
        nextQuestion();
    }

    function updateHUD() {
        ui.score.innerText = `得点: ${score}`;
        ui.stage.innerText = stageNames[currentStage];
        let hearts = '';
        for(let i=0; i<3; i++) {
            hearts += (i < lives) ? '♥' : '♡';
        }
        ui.lives.innerHTML = `<span class="heart">${hearts}</span>`;
    }

    function announceStage() {
        return new Promise(resolve => {
            ui.announcer.innerText = stageNames[currentStage];
            ui.announcer.classList.remove('announce');
            void ui.announcer.offsetWidth; // リフロー強制
            ui.announcer.classList.add('announce');
            
            setTimeout(() => {
                resolve();
            }, 2000);
        });
    }

    function nextQuestion() {
        if (lives <= 0) {
            gameOver();
            return;
        }

        // ステージ進行チェック
        if (questionCountInStage >= questionsPerStage) {
            if (currentStage < 4) {
                currentStage++;
                questionCountInStage = 0;
                clearInterval(timerInterval);
                ui.kanji.innerText = "";
                announceStage().then(() => setKanji());
                return;
            } else {
                // クリア時（延々と達人レベルを続けるか、クリアにするか）
                // 今回はランダムに達人レベルを出題し続ける
            }
        }

        setKanji();
    }

    function setKanji() {
        const stageData = kanjiDatabase[currentStage];
        // ランダムに選ぶ
        const randIndex = Math.floor(Math.random() * stageData.length);
        currentKanji = stageData[randIndex];
        
        ui.kanji.innerText = currentKanji.word;
        ui.input.value = '';
        ui.input.focus();

        // アニメーションリセット
        ui.kanji.classList.remove('zoom-in');
        void ui.kanji.offsetWidth; 
        ui.kanji.classList.add('zoom-in');
        
        // 難易度に応じてアニメーションの速度を変える
        const animDuration = timeLimits[currentStage] / 1000;
        ui.kanji.style.animationDuration = `${animDuration}s`;

        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        maxTime = timeLimits[currentStage];
        timeLeft = maxTime;
        isPlaying = true;
        
        ui.timerBar.style.width = '100%';
        ui.timerBar.style.backgroundColor = 'var(--accent-color)';

        let lastUpdate = Date.now();

        timerInterval = setInterval(() => {
            const now = Date.now();
            const dt = now - lastUpdate;
            lastUpdate = now;
            
            timeLeft -= dt;
            
            const percentage = Math.max(0, (timeLeft / maxTime) * 100);
            ui.timerBar.style.width = `${percentage}%`;

            if (percentage < 30) {
                ui.timerBar.style.backgroundColor = '#8b0000'; // 焦る色
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                handleWrongAnswer();
            }
        }, 16); // 約60fps
    }

    function handleInput() {
        if (!isPlaying) return;
        
        const userInput = kataToHira(ui.input.value.trim());
        if (userInput === '') return;

        // 正解判定
        if (userInput === currentKanji.reading) {
            handleCorrectAnswer();
        } else {
            // ゲームの性質上、間違えた時点でライフを減らすか、エンターを押した時だけ判定するか。
            // 遊びやすさを考慮し、ここでは「間違った入力でエンター」でミス扱いにする。
            handleWrongAnswer();
        }
    }

    ui.input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.isComposing) {
            handleInput();
        }
    });

    function showFeedback(isCorrect) {
        ui.feedback.innerText = isCorrect ? '〇' : '✕';
        ui.feedback.className = isCorrect ? 'feedback-maru' : 'feedback-batsu';
        
        ui.feedback.classList.remove('show-feedback');
        void ui.feedback.offsetWidth;
        ui.feedback.classList.add('show-feedback');
        
        setTimeout(() => {
            ui.feedback.classList.remove('show-feedback');
        }, 500);
    }

    function handleCorrectAnswer() {
        isPlaying = false;
        clearInterval(timerInterval);
        showFeedback(true);
        
        // 得点計算 (残り時間ボーナス + ステージ基本点)
        const baseScore = currentStage * 100;
        const timeBonus = Math.floor((timeLeft / maxTime) * 50);
        score += baseScore + timeBonus;
        
        questionCountInStage++;
        updateHUD();
        
        setTimeout(nextQuestion, 600);
    }

    function handleWrongAnswer() {
        isPlaying = false;
        clearInterval(timerInterval);
        showFeedback(false);
        
        lives--;
        updateHUD();
        
        // 正解を表示する
        ui.input.value = currentKanji.reading;
        ui.input.blur();
        
        // 画面を少し揺らす演出
        const container = document.getElementById('game-container');
        container.style.transform = 'translate(5px, 5px)';
        setTimeout(() => container.style.transform = 'translate(-5px, -5px)', 50);
        setTimeout(() => container.style.transform = 'translate(5px, -5px)', 100);
        setTimeout(() => container.style.transform = 'translate(0, 0)', 150);

        setTimeout(() => {
            nextQuestion();
        }, 1500);
    }

    function gameOver() {
        isPlaying = false;
        clearInterval(timerInterval);
        
        const finalScoreElem = document.getElementById('final-score');
        const evalElem = document.getElementById('evaluation');
        
        finalScoreElem.innerText = score;
        
        let evaluationText = "";
        if (score < 500) evaluationText = "まだまだ修行が足りぬようだな。";
        else if (score < 1500) evaluationText = "見事な腕前。だが上には上がいる。";
        else if (score < 3000) evaluationText = "あっぱれ！かなりの漢字使いと見受けた。";
        else evaluationText = "神業！そなたこそが真の漢字マスターなり！";
        
        evalElem.innerText = evaluationText;
        
        switchScreen('result');
    }

    function returnToTitle() {
        switchScreen('title');
    }

    // 画面クリックでも入力欄にフォーカスを戻す
    document.getElementById('play-screen').addEventListener('click', () => {
        if(isPlaying) ui.input.focus();
    });

</script>
</body>
</html>
